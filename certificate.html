<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Character Certificate Maker – 26Predictor</title>
  <meta name="description" content="Free online Character Certificate maker. Fill the form and get a printable character certificate instantly." />
  <link rel="icon" href="favicon.png" type="image/png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #6c63ff;
      --primary-dark: #574fd6;
      --bg: #0f0f1a;
      --bg2: #16162a;
      --card: #1e1e36;
      --text: #e8e8f0;
      --muted: #9999bb;
      --border: rgba(108,99,255,0.25);
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAVBAR ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5%;
      height: 64px;
      background: rgba(15,15,26,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.15rem;
      color: var(--text);
    }
    .nav-logo img { width: 30px; height: 30px; border-radius: 8px; }
    .back-link {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--primary); }
    .back-link img {
      width: 16px;
      filter: brightness(0) saturate(100%) invert(65%) sepia(10%) saturate(500%) hue-rotate(200deg);
    }
    .back-link:hover img {
      filter: invert(58%) sepia(60%) saturate(500%) hue-rotate(210deg);
    }

    /* ── PAGE CONTENT ── */
    .page-header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 40px 5%;
      text-align: center;
    }
    .page-header .tag {
      display: inline-block;
      background: rgba(108,99,255,0.15);
      color: var(--primary);
      border-radius: 50px;
      padding: 4px 14px;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
    }
    .page-header h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800;
      margin-bottom: 10px;
    }
    .page-header p { color: var(--muted); max-width: 540px; margin: 0 auto; }

    /* ── IFRAME CONTAINER ── */
    .iframe-container {
      flex: 1;
      max-width: 1000px;
      width: 100%;
      margin: 40px auto;
      padding: 0 5%;
    }
    .iframe-wrapper {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .iframe-wrapper iframe {
      width: 100%;
      height: 820px;
      border: none;
      display: block;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--bg2);
      border-top: 1px solid var(--border);
      padding: 28px 5%;
      text-align: center;
    }
    .footer-inner {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .footer-links {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .footer-links a { color: var(--muted); text-decoration: none; font-size: 0.88rem; transition: color 0.2s; }
    .footer-links a:hover { color: var(--primary); }
    .footer-copy { color: var(--muted); font-size: 0.82rem; }

    @media (max-width: 600px) {
      .iframe-wrapper iframe { height: 600px; }
    }
  </style>
</head>
<body>

  <!-- ── NAVBAR ── -->
  <nav>
    <a href="/" class="nav-logo">
      <img src="favicon.png" alt="26Predictor" />
      26Predictor
    </a>
    <a href="/" class="back-link">
      <img src="26Predictor/leftArrow.svg" alt="" />
      Back to Home
    </a>
  </nav>

  <!-- ── PAGE HEADER ── -->
  <div class="page-header">
    <div class="tag">Free Tool</div>
    <h1>Character Certificate Maker</h1>
    <p>Fill the form below to instantly generate a printable character certificate. No login required.</p>
  </div>

  <!-- ── IFRAME ── -->
  <div class="iframe-container">
    <div class="iframe-wrapper">
      <iframe
        src="https://indiatyping.com/certificate/character/character_certificate_form.php"
        title="Character Certificate Form"
        loading="lazy"
        allowfullscreen
      ></iframe>
    </div>
  </div>

  <!-- ── FOOTER ── -->
  <footer>
    <div class="footer-inner">
      <div class="footer-links">
        <a href="/">Home</a>
        <a href="/#tools">Other Tools</a>
        <a href="/#features">Features</a>
        <a href="/#blog">Blog</a>
      </div>
      <p class="footer-copy">© 2024 26Predictor. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
